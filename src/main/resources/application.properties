spring.application.name=java-full-stack-assessment

# OpenAPI paths
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT issuer - Keycloak (docker compose up -d)
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8180/realms/geocento

# HTTP Basic fallback: user / password
spring.security.user.name=user
spring.security.user.password=password
